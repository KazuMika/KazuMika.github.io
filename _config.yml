about_content: |
  現在AIエージェントエンジニアリングに関わるエンジニア。業務では、エージェントのハーネス設計・ループ制御、オーケストレーション、マルチエージェント構成、RAGパイプラインの設計・性能検証に従事。それ以前は機械学習・コンピュータビジョン分野の研究開発に携わる。
  2020年に修士号取得後、東京ガスiネット株式会社にてWebアプリケーションフレームワークの維持管理に従事。同年より慶應義塾大学大学院政策・メディア研究科博士課程に進学し、機械学習とIoTを活用したリアルタイム都市データの取得・利活用を研究。2023年よりティアンドエス株式会社チーフエンジニアとして、深層学習アプリケーションの研究開発およびチームマネジメントを担当。2024年より麗澤大学研究員として、ゴミ排出行動のリアルタイムセンシングとゲーミフィケーションによる行動変容促進の研究開発に従事。2025年3月よりBIPROGY株式会社にて、AIエージェントやRAGを中心とする生成AIシステムの開発・性能検証に従事。2026年6月に博士公聴会に合格し、同年9月に博士号（政策・メディア）を取得予定。
  2018年度人工知能学会全国大会学生奨励賞、2019年度WSN-IoT AWARD 最優秀賞をそれぞれ受賞。2019年度Sylff Fellowship、2021年度博士課程学生研究支援プログラム採択。2017年度学部・大学院修士4年一貫教育プログラムに採択され、学士号を3年、修士号を1年で取得。
content:
  - title: Work Experience # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: BIPROGY
        sub_title: AIエージェントエンジニア
        caption: 2025.3 - 現在
        description: | # this will include new lines to allow paragraphs
          - 概要：生成AIを活用したシステムの開発および性能検証を担当。AzureおよびAWS上での設計・実装まで一貫して従事。
          - AIエージェント開発：Claude Codeを活用した開発を推進。エージェントのハーネス設計・ループ制御（harness & loop engineering）、オーケストレーション、マルチエージェント構成の構築を担当。
          - RAGシステムの開発・性能検証：セマンティック検索やリランキングを組み込んだRAGパイプラインを設計・実装し、評価フレームワーク（DeepEval）を用いて検索・生成品質を定量的に検証。
      - layout: left
        title: 麗澤大学
        # link: www.reitaku-u.ac.jp/
        # link_text: www.reitaku-u.ac.jp/
        sub_title: 研究員
        caption: 2024.6 - 2025.2
        description: | # this will include new lines to allow paragraphs
          - 概要：ゴミ排出行動のリアルタイムセンシング・トレース技術を構築し、細粒度かつ大規模なデータ収集、可視化、ゲーミフィケーションによる行動変容促進アプリの研究開発を担当。
          - ゴミ排出量センシングと可視化：清掃車のドライブレコーダー映像から、物体検出（YOLOv5）とIoUトラッキングによりゴミ排出量を取得するアルゴリズムを開発。低フレームレート（8fps）環境での比較検証に基づきSORTではなくIoU方式を採用し、F値を約3%向上。位置・時間情報と組み合わせた時空間可視化アプリも開発。
          - 動画処理向け深層学習モデルの高速化：フレーム間情報に基づき必要フレームのみを確率的に選択するアルゴリズムを開発し、精度低下を軽微に抑えつつ処理速度を92%向上。
          - 運用・マネジメント：GPUサーバ4台の構築・運用、メンバー4名の進捗管理およびミーティング運営。
      - layout: left
        title: ティアンドエス
        # link: www.tecsvc.co.jp/
        # link_text: www.tecsvc.co.jp
        sub_title: チーフエンジニア（サブリーダー）
        caption: 2023.7 - 2024.5
        description: | # this will include new lines to allow paragraphs
          - 概要：プロトタイプアプリの研究開発、技術調査、モデル検証を担当。
          - 電子回路基板の部品検出：物体検出モデル（YOLOX）で基板上の約30種類の部品を検出。高解像度画像での精度低下に対し画像分割手法を導入し、再現率を約30%向上。
          - 良品画像からの不良品データ生成：良品のRGB画像から不良品のRGB・白色・強調白色画像および高さデータを生成。DreamBooth Inpainting＋pix2pix＋Monodepth2を組み合わせた手法と、4種の画像をスタックした12チャネル入力の単一モデル（DeepFillv2）による手法を考案。
          - 2D/3D骨格データ抽出：複数カメラ映像からOpenPose・三角測量・RANSACにより3D骨格を抽出するアプリを開発。再投影2Dデータの高精度性に着目した半自動アノテーションツールも開発。
          - その他：自動運転向けマップ技術の調査（論文・企業動向の両面）、PointCLIPによる3Dデータ活用検証、GPUサーバ2台の運用、メンバー4名の進捗管理。
      - layout: left
        title: 東京ガスiネット
        # link: www.tg-inet.co.jp
        # link_text: www.tg-inet.co.jp
        # sub_title: chief engineer
        caption: 2020.4 - 2023.6
        description: |
          - システムエンジニアとしてWebアプリケーションフレームワークの運用保守を担当。博士課程での研究と並行して勤務。
